version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: bankcards-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bankcards
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: HYf663x1+
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bankcards-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bankcards"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring app
  app:
    build: .
    container_name: bankcards-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bankcards
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "HYf663x1+"
      JWT_SECRET: dGhpcy1pcy1hLXNlY3JldC1rZXktd2l0aC0zMi1ieXRlcy1sZW5ndGgtZm9yLWp3dC1hdXRoZW50aWNhdGlvbg==
      JWT_EXPIRATION: 86400000
      CARD_ENCRYPTION_PASSWORD: anotherUltraPassword
      CARD_ENCRYPTION_SALT: randomSaltForCardsTable12356
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ultraPassword
      ADMIN_EMAIL: admin@company.com
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - bankcards-network

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bankcards-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - bankcards-network

networks:
  bankcards-network:
    driver: bridge

volumes:
  postgres_data: